spring.application.name=demo

# --- PostgreSQL ---
# Wartosci nadpisywane zmiennymi srodowiskowymi w docker-compose.
# Lokalnie (Spring z IDE) laczy sie z baza w kontenerze przez localhost:5432.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bookstore}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:bookstore}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:bookstore}

# --- Hibernate ---
# Flyway jest jedynym wlascicielem schematu, Hibernate tylko WALIDUJE encje wzgledem tabel.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# --- Flyway ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
